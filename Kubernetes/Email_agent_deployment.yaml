# ─── Auto-Répondeur Email par Agents IA ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-agent-deployment
  labels:
    app: email-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-agent
  template:
    metadata:
      labels:
        app: email-agent
    spec:
      containers:
        - name: email-agent
          image: barrada-yasser/email-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: claude-api-key
            - name: GMAIL_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: gmail-credentials
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: email-agent-service
spec:
  selector:
    app: email-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
data:
  claude-api-key: <base64-encoded-key>
  gmail-credentials: <base64-encoded-credentials>
